<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PermitIQ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; padding: 20px; }
    .container { max-width: 720px; margin: 0 auto; }
    h1 { text-align: center; font-size: 1.8rem; color: #1a1a2e; margin-bottom: 4px; }
    .subtitle { text-align: center; color: #666; font-size: 0.9rem; margin-bottom: 24px; }
    .card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    input { width: 100%; padding: 14px 16px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 1rem; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: #4361ee; }
    .btn-search { width: 100%; padding: 14px; background: #4361ee; color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 12px; transition: background 0.2s; }
    .btn-search:hover { background: #3451d1; }
    .btn-search:disabled { background: #a0aec0; cursor: not-allowed; }
    .btn-ghl { width: 100%; padding: 14px; background: #16a34a; color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 12px; transition: background 0.2s; }
    .btn-ghl:hover { background: #15803d; }
    .btn-ghl:disabled { background: #a0aec0; cursor: not-allowed; }
    .badge { display: inline-block; padding: 6px 18px; border-radius: 20px; font-weight: 700; font-size: 1rem; color: white; margin-bottom: 16px; }
    .badge.red    { background: #e63946; }
    .badge.yellow { background: #f4a261; }
    .badge.green  { background: #2a9d8f; }
    .badge.purple { background: #7b2d8b; }
    .section-title { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #999; margin: 16px 0 8px; }
    .info-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid #f5f5f5; font-size: 0.92rem; }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: #666; }
    .info-value { font-weight: 600; color: #1a1a2e; text-align: right; max-width: 60%; }
    .source-note { font-size: 0.8rem; color: #888; margin-top: 10px; font-style: italic; }
    .permit-row { background: #f8f9fa; border-radius: 8px; padding: 10px 14px; margin-bottom: 8px; font-size: 0.88rem; }
    .permit-row.roof { border-left: 3px solid #4361ee; }
    .permit-row.electric { border-left: 3px solid #f59e0b; }
    .permit-row.ac { border-left: 3px solid #06b6d4; }
    .permit-desc { font-weight: 600; color: #1a1a2e; }
    .permit-meta { color: #666; margin-top: 3px; font-size: 0.82rem; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.72rem; font-weight: 700; margin-left: 6px; }
    .tag-roof    { background: #e8f0fe; color: #4361ee; }
    .tag-electric{ background: #fef3c7; color: #d97706; }
    .tag-ac      { background: #e0f2fe; color: #0284c7; }
    .tag-F { background: #dcfce7; color: #16a34a; }
    .tag-E { background: #fff7ed; color: #ea580c; }
    .absentee-badge { background: #fef9c3; color: #854d0e; padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: 600; }
    .homestead-yes { color: #16a34a; font-weight: 700; }
    .homestead-no  { color: #dc2626; font-weight: 700; }
    .hidden { display: none; }
    .ghl-success { background: #dcfce7; color: #16a34a; border-radius: 8px; padding: 10px 14px; font-size: 0.9rem; font-weight: 600; margin-top: 10px; text-align: center; }
    .ghl-error   { background: #fee2e2; color: #dc2626; border-radius: 8px; padding: 10px 14px; font-size: 0.9rem; margin-top: 10px; }
  </style>
</head>
<body>
<div class="container">
  <h1>🔧 PermitIQ</h1>
  <p class="subtitle">Consulta de permisos de construcción en Florida</p>

  <div class="card">
    <input id="addressInput" type="text" placeholder="Ej: 14930 NE 14 AVE, Miami, FL"/>
    <button class="btn-search" id="searchBtn" onclick="search()">🔍 BUSCAR PERMISOS</button>
  </div>

  <div id="resultCard" class="card hidden"></div>
</div>

<script>
let lastData = null;

async function search() {
  const address = document.getElementById('addressInput').value.trim();
  if (!address) return;
  const btn = document.getElementById('searchBtn');
  const card = document.getElementById('resultCard');
  btn.disabled = true;
  btn.textContent = '⏳ Buscando...';
  card.className = 'card';
  card.innerHTML = '<div style="text-align:center;padding:20px;color:#666">Consultando permisos...</div>';

  try {
    const res = await fetch('/api/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ address })
    });
    const json = await res.json();
    lastData = json.data;
    renderResult(json.data, address);
  } catch(e) {
    card.innerHTML = `<div style="color:#dc2626">❌ Error: ${e.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '🔍 BUSCAR PERMISOS';
  }
}

function fmt(val, prefix='', suffix='') {
  if (val == null) return '<span style="color:#aaa">—</span>';
  return prefix + val.toLocaleString() + suffix;
}

function renderResult(d, address) {
  const card = document.getElementById('resultCard');
  const color = d.color || 'purple';

  // Sección PA
  const paHtml = `
    <div class="section-title">👤 Propietario</div>
    <div class="info-row"><span class="info-label">Nombre</span><span class="info-value">${d.ownerName || '—'}</span></div>
    <div class="info-row"><span class="info-label">Homestead</span><span class="info-value ${d.homestead==='SI'?'homestead-yes':'homestead-no'}">${d.homestead==='SI'?'✅ SÍ — Dueño vive ahí':'❌ NO'}</span></div>
    <div class="info-row"><span class="info-label">Municipio</span><span class="info-value">${d.municipality || '—'}</span></div>
    <div class="info-row"><span class="info-label">Folio</span><span class="info-value">${d.folio || '—'}</span></div>
    ${d.isAbsentee ? `<div class="info-row"><span class="info-label">Dirección postal</span><span class="info-value"><span class="absentee-badge">📬 ABSENTEE</span> ${d.mailingAddress}</span></div>` : ''}

    <div class="section-title">🏠 Propiedad</div>
    <div class="info-row"><span class="info-label">Año construcción</span><span class="info-value">${fmt(d.yearBuilt)}</span></div>
    <div class="info-row"><span class="info-label">Tamaño</span><span class="info-value">${fmt(d.sqft, '', ' sq ft')}</span></div>
    <div class="info-row"><span class="info-label">Lote</span><span class="info-value">${fmt(d.lotSize, '', ' sq ft')}</span></div>
    <div class="info-row"><span class="info-label">Cuartos / Baños</span><span class="info-value">${d.bedrooms||'—'} / ${d.bathrooms||'—'}</span></div>
    <div class="info-row"><span class="info-label">Valor tasado</span><span class="info-value">${fmt(d.totalValue, '$')}</span></div>
  `;

  // Sección permisos categorizados
  const permSection = (label, perm, tagClass) => {
    if (!perm) return `<div class="info-row"><span class="info-label">${label}</span><span class="info-value" style="color:#aaa">Sin datos</span></div>`;
    return `<div class="info-row"><span class="info-label">${label}</span><span class="info-value">${perm.date} · ${perm.contractor||'—'}</span></div>`;
  };

  const permHtml = `
    <div class="section-title">🔨 Permisos Recientes</div>
    ${permSection('🏠 Techo', d.roofPermit, 'tag-roof')}
    ${permSection('⚡ Eléctrico', d.elecPermit, 'tag-electric')}
    ${permSection('❄️ A/C', d.acPermit, 'tag-ac')}
  `;

  // Lista detallada
  let listHtml = '';
  if (d.allPermits && d.allPermits.length > 0) {
    const tagMap = { ROOF: 'tag-roof', ELECTRIC: 'tag-electric', AC: 'tag-ac', OTHER: '' };
    const borderMap = { ROOF: 'roof', ELECTRIC: 'electric', AC: 'ac', OTHER: '' };
    listHtml = `
      <div class="section-title">📋 Todos los permisos (${d.allPermits.length})</div>
      ${d.allPermits.map(p => `
        <div class="permit-row ${borderMap[p.category]||''}">
          <div class="permit-desc">
            ${p.description || p.type}
            ${p.category !== 'OTHER' ? `<span class="tag ${tagMap[p.category]}">${p.category}</span>` : ''}
            <span class="tag ${p.status==='F'?'tag-F':'tag-E'}">${p.status==='F'?'Finalizado':'Expirado'}</span>
          </div>
          <div class="permit-meta">${p.date} · ${p.contractor||'—'} · #${p.permitNo||'—'}</div>
        </div>
      `).join('')}
    `;
  }

  card.innerHTML = `
    <span class="badge ${color}">${d.label}</span>
    <div class="info-row">
      <span class="info-label">📍 Dirección</span>
      <span class="info-value">${address}</span>
    </div>
    <div class="info-row">
      <span class="info-label">🗺️ Condado</span>
      <span class="info-value">${d.county}</span>
    </div>
    <div class="info-row">
      <span class="info-label">🏠 Edad del techo</span>
      <span class="info-value">${d.roofAge != null ? d.roofAge + ' años' : 'Desconocida'}</span>
    </div>
    <div class="info-row">
      <span class="info-label">📅 Último permiso techo</span>
      <span class="info-value">${d.latestRoofYear || 'Sin datos'}</span>
    </div>
    ${d.sourceNote ? `<p class="source-note">ℹ️ ${d.sourceNote}</p>` : ''}
    ${paHtml}
    ${permHtml}
    ${listHtml}
    <button class="btn-ghl" onclick="pushToGHL()">🚀 Agregar a GoHighLevel</button>
    <div id="ghl-status"></div>
  `;
}

async function pushToGHL() {
  if (!lastData) return;
  const btn = document.querySelector('.btn-ghl');
  const status = document.getElementById('ghl-status');
  btn.disabled = true;
  btn.textContent = '⏳ Enviando a GHL...';
  try {
    const res = await fetch('/api/ghl-push', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        address:   lastData.address,
        ghlFields: lastData.ghlFields,
        ownerName: lastData.ownerName,
      })
    });
    const json = await res.json();
    if (json.success) {
      status.innerHTML = '<div class="ghl-success">✅ Datos enviados a GoHighLevel correctamente</div>';
      btn.textContent = '✅ Enviado a GHL';
    } else {
      throw new Error(json.error || 'Error desconocido');
    }
  } catch(e) {
    status.innerHTML = `<div class="ghl-error">❌ Error: ${e.message}</div>`;
    btn.disabled = false;
    btn.textContent = '🚀 Agregar a GoHighLevel';
  }
}

document.getElementById('addressInput').addEventListener('keypress', e => {
  if (e.key === 'Enter') search();
});
</script>
</body>
</html>
