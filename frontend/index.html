<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PermitIQ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
    .container { max-width: 680px; margin: 0 auto; }
    h1 { text-align: center; font-size: 1.8rem; margin-bottom: 4px; }
    .subtitle { text-align: center; color: #666; font-size: 0.9rem; margin-bottom: 24px; }
    .card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    input { width: 100%; padding: 14px 16px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 1rem; outline: none; }
    input:focus { border-color: #4361ee; }
    button { width: 100%; padding: 14px; background: #4361ee; color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 12px; }
    button:disabled { background: #a0aec0; }
    #debug-box { background: #111; color: #0f0; padding: 16px; border-radius: 8px; white-space: pre-wrap; font-size: 12px; font-family: monospace; margin-top: 16px; max-height: 600px; overflow-y: auto; }
  </style>
</head>
<body>
<div class="container">
  <h1>🔧 PermitIQ</h1>
  <p class="subtitle">Consulta de permisos de construcción en Florida</p>
  <div class="card">
    <input id="addr" type="text" placeholder="14930 NE 14 AVE, Miami, FL" value="14930 NE 14 AVE, Miami, FL"/>
    <button id="btn" onclick="search()">🔍 BUSCAR</button>
  </div>
  <div class="card">
    <div id="debug-box">Esperando búsqueda...</div>
  </div>
</div>
<script>
async function search() {
  const address = document.getElementById('addr').value.trim();
  const btn = document.getElementById('btn');
  const box = document.getElementById('debug-box');
  btn.disabled = true;
  btn.textContent = '⏳ Buscando...';
  box.textContent = 'Consultando...';
  try {
    const res = await fetch('/api/search', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ address })
    });
    const data = await res.json();
    box.textContent = JSON.stringify(data, null, 2);
  } catch(e) {
    box.textContent = 'ERROR: ' + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = '🔍 BUSCAR';
  }
}
</script>
</body>
</html>
