name: Deploy PermitIQ a Render

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
      - run: echo "Deploy a Render disparado"
